name: Desktop CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Tauri desktop build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Tauri app
        run: pnpm tauri:build

      - name: "macOS: Import signing certificate"
        if: matrix.os == 'macos-latest'
        run: |
          echo "$MACOS_CERT" | base64 --decode > mac_cert.p12
          security create-keychain -p "$MAC_KEYCHAIN_PASSWORD" build.keychain
          security import mac_cert.p12 -k ~/Library/Keychains/build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s ~/Library/Keychains/build.keychain
          security default-keychain -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" ~/Library/Keychains/build.keychain
        env:
          MACOS_CERT: ${{ secrets.MACOS_CERT }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}

      - name: "macOS: Codesign bundles"
        if: matrix.os == 'macos-latest'
        run: |
          find src-tauri/target/release/bundle -name "*.app" -maxdepth 3 -print -exec codesign --deep --force --options runtime --sign "$MACOS_SIGNING_ID" {} \;
        env:
          MACOS_SIGNING_ID: ${{ secrets.MACOS_SIGNING_ID }}

      - name: "macOS: Notarize signed bundles"
        if: matrix.os == 'macos-latest'
        run: |
          for f in $(find src-tauri/target/release/bundle -type f -name "*.dmg" -o -name "*.pkg" -o -name "*.zip"); do
            xcrun notarytool submit "$f" --apple-id "$APPLE_ID" --team-id "$MAC_TEAM_ID" --password "$APP_SPECIFIC_PASSWORD" --wait
            xcrun stapler staple "$f" || true
          done
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          MAC_TEAM_ID: ${{ secrets.MAC_TEAM_ID }}

      - name: "Windows: Write PFX certificate"
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "$WINDOWS_PFX" | base64 --decode > cert.pfx
        env:
          WINDOWS_PFX: ${{ secrets.WINDOWS_PFX }}

      - name: "Windows: Sign executables and installers"
        if: matrix.os == 'windows-latest'
        shell: powershell
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $pfx = "cert.pfx"
          Get-ChildItem -Path 'src-tauri\\target\\release\\bundle' -Recurse -Include *.exe,*.msi | ForEach-Object {
            & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" sign /f $pfx /p $env:WINDOWS_PFX_PASSWORD /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 $_.FullName
          }

      - name: "macOS: Verify code signatures and notarization"
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          for app in $(find src-tauri/target/release/bundle -name "*.app" -maxdepth 3); do
            echo "Verifying codesign for $app"
            codesign --verify --deep --strict --verbose=2 "$app"
            echo "Gatekeeper assess: $app"
            spctl --assess --type execute --verbose=4 "$app" || true
          done
          for f in $(find src-tauri/target/release/bundle -type f -name "*.dmg" -o -name "*.pkg" -o -name "*.zip"); do
            echo "Stapler validate for $f"
            xcrun stapler validate "$f" || echo "Stapler validate failed for $f"
          done

      - name: "Windows: Verify signatures"
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          Get-ChildItem -Path 'src-tauri\\target\\release\\bundle' -Recurse -Include *.exe,*.msi | ForEach-Object {
            Write-Host "Verifying signature for $($_.FullName)"
            & "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe" verify /pa /v $_.FullName
          }

      - name: "Linux: Generate checksums for artifacts"
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p artifacts_checksums
          find src-tauri/target/release/bundle -type f -print0 | xargs -0 sha256sum > artifacts_checksums/sha256sums.txt || true

      - name: Upload desktop bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle
            src-tauri/target/release/bundle/**/*

  release:
    name: Create GitHub Release (tag)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts for debug
        run: ls -la artifacts || true

      - name: Create GitHub release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          files: |
            artifacts/**
